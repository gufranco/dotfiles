# GoAccess - https://goaccess.io/man
# Symlinked to ~/.config/goaccess/goaccess.conf

################################################################################
# Time format (for parsing log timestamps)
################################################################################
time-format %H:%M:%S

################################################################################
# Date format
################################################################################
date-format %d/%b/%Y

################################################################################
# Log format
################################################################################
# NCSA Combined Log Format (Apache/Nginx default)
log-format COMBINED

################################################################################
# Output
################################################################################
# Real-time HTML report
real-time-html true

# Color scheme
color-scheme 1

################################################################################
# Parsing
################################################################################
# Ignore crawlers
ignore-crawlers true

# Ignore these status codes in the request panel
ignore-status 301
ignore-status 302

# IP anonymization (GDPR)
anonymize-ip true

################################################################################
# Display
################################################################################
# Double decode URLs
double-decode false

# No query strings in requests
no-query-string false

# 404 panel
404-to-unique-count false

################################################################################
# File settings
################################################################################
# Database storage for large logs
keep-last 30

# Process and display real-time log data
output stdout
