################################################################################
# Terminal & Display
################################################################################
# Truecolor (RGB) is declared explicitly here so it applies even when $COLORTERM
# is not forwarded, for example over SSH. The first line uses set -s (replace) to
# reset the array on reload and prevent accumulation; sensible also enables RGB
# when $COLORTERM advertises truecolor.
set -s terminal-features 'xterm*:RGB'
set -sa terminal-features ',iTerm2:RGB'
set -sa terminal-features ',tmux-256color:RGB'
set -sa terminal-features ',screen*:RGB'

################################################################################
# Windows & Panes
################################################################################
# base-index, pane-base-index, renumber-windows, and aggressive-resize all come
# from tmux-sensible-revamped now. aggressive-resize is control-mode aware there:
# on for normal clients, off only under iTerm2's native integration. mode-keys is
# kept because EDITOR is not always a vi variant.

# Use vim key bindings in copy mode
setw -g mode-keys vi

# Window title settings
set -g allow-rename off
set -g set-titles on
set -g set-titles-string '#S:#W'

# Silence notifications
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

################################################################################
# Keybindings
################################################################################
# Window Navigation
# Usage: Prefix + Tab - Switch to last active window
bind Tab last-window

# Reload Configuration
# Usage: Prefix + r - Reload tmux config and show confirmation
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"

# Edit Configuration
# Usage: Prefix + e - Open tmux config in $EDITOR, reload on exit
bind e new-window -n "~/.tmux.conf" sh -c '_E=${VISUAL:-${EDITOR:-vim}}; case "$_E" in *vim*) "$_E" -c ":set syntax=tmux" ~/.tmux.conf;; *) "$_E" ~/.tmux.conf;; esac && tmux source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"'

# Session Navigation
# Usage:
#   Prefix + BTab (Shift+Tab) - Switch to last session
#   Prefix + C-c - Create new session
#   Prefix + C-f - Find session (opens command prompt to search)
bind BTab switch-client -l
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Detach and Rename
# Usage:
#   Prefix + Q - Detach from tmux session
#   Prefix + A - Rename current window (GNU screen convention)
bind Q detach-client
bind A command-prompt -I "#W" { rename-window "%%" }

# Scrollback Search
# Usage:
#   Prefix + W - Open scrollback in vim (read-only, cursor at bottom)
#   Prefix + / - Search scrollback with fzf, selected line copied to tmux buffer
bind W run-shell 'f=$(mktemp "${TMPDIR:-/tmp}"/tmux-scrollback.XXXXXX) && tmux capture-pane -S -50000 -p > "$f" && tmux new-window "vim -R +\"normal G\" \"$f\"; rm -f \"$f\""'
bind / run-shell 'f=$(mktemp "${TMPDIR:-/tmp}"/tmux-scrollback.XXXXXX) && tmux capture-pane -S -50000 -p > "$f" && tmux new-window "selected=\$(fzf --tac --no-sort < \"$f\") && [ -n \"\$selected\" ] && printf \"%s\" \"\$selected\" | tmux load-buffer - && tmux display-message \"Copied to tmux buffer\"; rm -f \"$f\""'

# Copy Mode (Vim-style)
# Usage:
#   Prefix + [ - Enter copy mode
#   Prefix + Enter - Enter copy mode (alternative shortcut)
#   v - Start selection (visual mode)
#   C-v - Rectangle selection
#   H - Move to start of line
#   L - Move to end of line
#   Escape - Cancel selection and exit copy mode
#   y - Copy selection and exit (handled by tmux-yank plugin)
#   Y - Copy and paste immediately (from tmux-yank)
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Paste Buffers
# Usage:
#   Prefix + p - Paste from most recent buffer
#   Prefix + P - Choose which buffer to paste from (interactive)
# Use Prefix + # to list buffers.
bind p paste-buffer -p
bind P choose-buffer

################################################################################
# Plugins
################################################################################
# TPM - Tmux Plugin Manager. Clones, loads, and updates every plugin listed
# below. The run line at the very bottom of this file boots it.
#
# Keys:
#   Prefix + I       - install plugins newly added to this file
#   Prefix + U       - update installed plugins
#   Prefix + Alt + u - remove plugins no longer listed (clean)
set -g @plugin 'tmux-plugins/tpm'

# Sensible Revamped - version, OS, and terminal aware defaults. Loaded first on
# purpose: every default is set only if the option still holds tmux's own default
# (non-destructive), so anything set explicitly above always wins.
#
# What it normalizes (each gated by tmux version and terminal, no keys):
#   - escape-time          short, kills the ESC delay in vim
#   - truecolor            tmux-256color + RGB when the terminal advertises it
#   - set-clipboard on     OSC 52 copy, picks pbcopy/wl-copy/xclip by environment
#   - focus-events on      lets vim see focus gained and lost
#   - base-index 1, pane-base-index 1, renumber-windows on
#   - repeat-time          longer window for repeated prefix keys
#   - undercurl, allow-passthrough, extended-keys where the version supports them
set -g @plugin 'gufranco/tmux-sensible-revamped'

# Pain Control Revamped - vim-style pane and window control. Splits and new
# windows keep the current path.
#
# Navigation and resize:
#   Prefix + h/j/k/l       - select pane left/down/up/right
#   Prefix + H/J/K/L       - resize the pane (repeatable)
#
# Splits and windows (all keep the current path):
#   Prefix + |             - split right
#   Prefix + -             - split down
#   Prefix + \             - split full width
#   Prefix + _             - split full height
#   Prefix + " and %       - the default splits, now path-aware
#   Prefix + c             - new window in the current path
#   Prefix + < and >       - move the current window left/right (repeatable)
#   Prefix + S             - toggle synchronized input across panes
#
# vim_navigation on (set below) also binds prefixless Ctrl+h/j/k/l and Ctrl+\ to
# move between vim splits and tmux panes in one chord (is_vim process check). The
# matching editor-side navigation lives in your editor config.
# Disable any single key with @pane_control_disabled_keys.
set -g @plugin 'gufranco/tmux-pain-control-revamped'
set -g @pane_control_vim_navigation 'on'

# Launcher Revamped - open a TUI app in a popup or a fresh window, always starting
# in the current pane's directory. List apps in @launcher_apps and set, per app,
# @launcher_<id>_{key,command,mode,name,width,height}. Popups need tmux 3.2 and
# fall back to a window automatically on older tmux.
#
# Apps:
#   Prefix + C-g           - lazygit, in an 80% popup (built-in default)
#   Prefix + C-y           - yazi, in a window (built-in default)
#   Prefix + C-a           - claude, in a popup
#   Prefix + C-b           - browsh, in a popup
set -g @plugin 'gufranco/tmux-launcher-revamped'
set -g @launcher_apps 'lazygit yazi claude browsh'
set -g @launcher_claude_key 'C-a'
set -g @launcher_browsh_key 'C-b'

# Catppuccin (Mocha) - the theme; drives every status-bar color and shape.
#   @catppuccin_flavor 'mocha'                - palette
#   @catppuccin_window_status_style 'rounded' - rounded window tabs
#   @catppuccin_window_text / _current_text   - show the window name (#W)
#   @catppuccin_date_time_text ' %H:%M'       - 24h clock
# Status line: the session module on the left, the clock on the right. Nothing
# else is on the bar by choice.
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_date_time_text ' %H:%M'
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_date_time}'

# tmux-continuum - automatic save and restore of the whole tmux environment,
# built on tmux-resurrect below.
#   @continuum-restore 'on' - restore the last saved environment on server start
# Auto-saves every 15 minutes (the default). No keys.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Tiling Revamped - i3-like BSP tiling window manager
# 8 layouts, 11 operations, 16 BSP orientations, zero dependencies.
#
# Prefix mode: all tiling keys use Prefix + key.
#
# Layouts:
#   Prefix + d     - Dwindle (BSP cascade, default for new windows)
#   Prefix + D     - Spiral (BSP with rotating split direction)
#   Prefix + v     - Main-vertical (master left, stack right)
#   Prefix + V     - Main-horizontal (master top, stack bottom)
#   Prefix + o     - Cycle to next layout in sequence
#   Prefix + P     - Layout picker (fzf popup with ASCII previews)
#   (grid, main-center, monocle, deck also available via cycle/picker)
#
# Operations:
#   Prefix + m     - Promote focused pane to master
#   Prefix + R     - Rotate layout 90 degrees
#   Prefix + F     - Flip layout horizontally
#   Prefix + C-n   - Circulate pane contents (shift all one position)
#   Prefix + C-d   - Autosplit along longest axis (i3-like)
#   Prefix + =     - Balance panes (equalize within layout)
#   Prefix + B     - Equalize panes (even distribution, ignore layout)
#   Prefix + }     - Grow master pane by 5%
#   Prefix + {     - Shrink master pane by 5%
#
# Marks and Scratchpads:
#   Prefix + N     - Mark pane with a name
#   Prefix + G     - Jump to marked pane (fzf picker)
#   Prefix + g     - Toggle floating scratchpad popup
#
# BSP Orientation: 4-char string controlling cascade direction.
#   Position 1: t/b (top/bottom), Position 2: l/r (left/right)
#   Position 3: h/v (horizontal/vertical), Position 4: c/s (corner/spiral)
#   Default: brvc (bottom-right, vertical, corner)
set -g @plugin 'gufranco/tmux-tiling-revamped'
set -g @tiling_revamped_auto_apply 1
set -g @tiling_revamped_default_layout "spiral"
set -g @tiling_revamped_master_ratio 60
set -g @tiling_revamped_resize_step 5
set -g @tiling_revamped_alt_keys 0
set -g @tiling_revamped_key_balance "="
set -g @tiling_revamped_key_rotate "R"
set -g @tiling_revamped_key_flip "F"
set -g @tiling_revamped_key_circulate "C-n"
set -g @tiling_revamped_key_sync ""
set -g @tiling_revamped_key_jump "G"
set -g @tiling_revamped_key_mark "N"
set -g @tiling_revamped_key_master_grow "}"
set -g @tiling_revamped_key_master_shrink "{"
set -g @tiling_revamped_key_pick_layout "P"

# tmux-resurrect - save and restore tmux sessions, windows, panes, and layouts.
#   Prefix + C-s           - save the current environment
#   Prefix + R             - restore (remapped from the default C-r via
#                            @resurrect-restore; note tiling also uses R, the
#                            later-loaded binding wins)
#   @resurrect-capture-pane-contents 'on' - also save and restore scrollback
#   @resurrect-strategy-vim 'session'     - restore vim from its Session.vim
# tmux-continuum above automates this on a timer and on server start.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-restore 'R'

# tmux-yank - copy to the system clipboard from copy mode.
#   y                      - copy the selection and exit copy mode
#   Y                      - copy the selection and paste it immediately
# Picks pbcopy/wl-copy/xclip automatically; no options set here.
set -g @plugin 'tmux-plugins/tmux-yank'

# Scroll Revamped - smart mouse wheel
#   Wheel up/down over a full-screen app (vim, less, man, htop, fzf, lazygit, ...)
#                          - sends the wheel straight to the app
#   Wheel up/down anywhere else
#                          - enters copy-mode and scrolls the scrollback
# On tmux 3.1+ the routing is a native #{m/r:...} regex over the pane's foreground
# command, so no process-tree walk and no shell forked per wheel tick. The
# passthrough list is @scroll_revamped_passthrough_apps (default covers common TUIs).
#   @scroll_revamped_mouse 'off' - mouse is already enabled near the top of this
#                                  file, so the plugin is told not to set it again
set -g @plugin 'gufranco/tmux-scroll-revamped'

# FZF Revamped - fuzzy switch or kill any session, window, or pane in an fzf popup.
#   Prefix + s             - switch session (takes over the default choose-tree)
#   Prefix + w             - switch window (takes over the default choose-tree)
#   Prefix + E             - switch pane (E because Prefix+e edits this config)
#   Prefix + X             - kill the chosen session
# Popup size is @fzf_revamped_popup_{width,height}. Needs fzf and tmux 3.2.
set -g @plugin 'gufranco/tmux-fzf-revamped'
set -g @fzf_revamped_session_key 's'
set -g @fzf_revamped_window_key 'w'
set -g @fzf_revamped_pane_key 'E'
set -g @fzf_revamped_kill_key 'X'

# Extract Revamped - fuzzy-grab text off the pane and paste it at the cursor.
#   Prefix + u             - open the picker (u because Prefix+Tab is last-window)
# It captures the pane, extracts candidates, and inserts the choice. The set is
# @extract_revamped_mode (default all): urls, paths, words, or lines. Extraction
# is pure shell (grep + awk), no Python. Scrollback depth is
# @extract_revamped_lines (200). Needs fzf and tmux 3.2.
set -g @plugin 'gufranco/tmux-extract-revamped'
set -g @extract_revamped_key 'u'

# Autoreload Revamped - re-source the config automatically when it changes, on top
# of the manual Prefix + r. No keys. One background watcher per server, its pid
# kept in @autoreload_revamped_pid so reloads never stack watchers.
#   Backend: fswatch, else inotifywait, else a polling loop
#   @autoreload_revamped_interval    - poll seconds for the fallback (default 2)
#   @autoreload_revamped_files       - the exact files to watch (set below to only
#                                      your own config); empty watches all loaded
#   @autoreload_revamped_entrypoints - files to source on a change
#   @autoreload_revamped_quiet       - set 1 to suppress the reload message
set -g @plugin 'gufranco/tmux-autoreload-revamped'
set -g @autoreload_revamped_interval '5'
set -g @autoreload_revamped_files '~/.tmux.conf'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
