# Feral GameMode configuration.
# Symlinked to ~/.config/gamemode.ini by install.sh.
# Applied per-game when a title is launched with `gamemoderun %command%`.
#
# On these hybrid laptops the safe, high-value wins are CPU governor flip,
# process priority, and I/O priority. GPU optimisations are left off because
# gamemode's GPU tuning targets a single fixed device and misbehaves with
# PRIME offload on NVIDIA hybrid; the NVIDIA path is handled elsewhere.

[general]
# Flip the CPU governor to performance while a game runs, revert on exit.
desiredgov=performance
defaultgov=schedutil
# Raise game priority (nice -10) so background work never preempts it.
renice=10
# Best-effort I/O priority class, highest level.
ioprio=0
# SCHED_ISO-like soft realtime scheduling via rtkit when available.
softrealtime=auto
# Inhibit the screensaver/idle while gaming.
inhibit_screensaver=1

# [gpu]
# Intentionally disabled on NVIDIA PRIME hybrid. Do not enable
# apply_gpu_optimisations here; GPU clocks on the dGPU are managed by the
# NVIDIA driver's dynamic power management instead.
