# Ranger - https://ranger.github.io
# Symlinked to ~/.config/ranger/rc.conf

################################################################################
# General
################################################################################
set viewmode miller
set column_ratios 1,3,4
set hidden_filter ^\.|\.(?:pyc|pyo|bak|swp)$|^lost\+found$|^__(py)?cache__$|^node_modules$|^\.git$
set show_hidden false
set confirm_on_delete multiple
set use_preview_script true
set preview_script ~/.config/ranger/scope.sh
set automatically_count_files true
set open_all_images true

################################################################################
# Display
################################################################################
set draw_borders both
set dirname_in_tabs true
set status_bar_on_top false
set tilde_in_titlebar true
set unicode_ellipsis true
set line_numbers relative

################################################################################
# Preview
################################################################################
set preview_files true
set preview_directories true
set collapse_preview true
set preview_max_size 10485760
set preview_images true
set preview_images_method kitty

################################################################################
# Version control
################################################################################
set vcs_aware true
set vcs_backend_git enabled
set vcs_backend_hg disabled
set vcs_backend_bzr disabled
set vcs_backend_svn disabled

################################################################################
# Sorting
################################################################################
set sort natural
set sort_reverse false
set sort_case_insensitive true
set sort_directories_first true
set sort_unicode false

################################################################################
# Filtering
################################################################################
set padding_right true

################################################################################
# Bookmarks
################################################################################
set show_selection_in_titlebar true
set idle_delay 2000

################################################################################
# Mouse
################################################################################
set mouse_enabled true

################################################################################
# Key bindings
################################################################################
# Toggle hidden files
map zh set show_hidden!

# Shortcuts to common directories
map gd cd ~/Downloads
map gw cd ~/Workspace
map gD cd ~/.dotfiles
map gc cd ~/.config

# Flat view (show all files recursively)
map gf flat 2

# Rename
map cw console rename%space

# Bulk rename with $EDITOR
map cr console bulkrename%space

# Copy file path to clipboard
map yp shell -d echo -n %f | pbcopy
map yd shell -d echo -n %d | pbcopy
map yn shell -d echo -n %s | pbcopy

# Open terminal in current directory
map S shell $SHELL

# fzf integration
map <C-f> fzf_select
