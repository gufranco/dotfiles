# Kitty - https://sw.kovidgoyal.net/kitty/conf
# Symlinked to ~/.config/kitty/kitty.conf

################################################################################
# Theme
################################################################################
include themes/tokyo-night.conf

################################################################################
# Font
################################################################################
font_family JetBrainsMono Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0
disable_ligatures never
adjust_line_height 110%

################################################################################
# Cursor
################################################################################
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration enabled

################################################################################
# Scrollback
################################################################################
scrollback_lines 50000
scrollback_pager bat --paging=always --style=plain
scrollback_fill_enlarged_window yes

################################################################################
# Mouse
################################################################################
mouse_hide_wait 3.0
copy_on_select clipboard
strip_trailing_spaces smart
focus_follows_mouse no
click_interval 0.3

################################################################################
# URL
################################################################################
url_style curly
detect_urls yes
open_url_with default

################################################################################
# Bell
################################################################################
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "* "

################################################################################
# Window
################################################################################
window_padding_width 8 8 6 8
placement_strategy center
confirm_os_window_close -1
remember_window_size yes
initial_window_width 120c
initial_window_height 36c
draw_minimal_borders yes
window_border_width 1pt
active_border_color #7aa2f7
inactive_border_color #414868

################################################################################
# Tab bar
################################################################################
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "
active_tab_foreground #1a1b26
active_tab_background #7aa2f7
active_tab_font_style bold
inactive_tab_foreground #a9b1d6
inactive_tab_background #292e42
inactive_tab_font_style normal

################################################################################
# Advanced
################################################################################
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}
term xterm-kitty
clipboard_control write-clipboard write-primary read-clipboard

################################################################################
# macOS
################################################################################
macos_option_as_alt yes
macos_titlebar_color background
macos_show_window_title_in window
macos_quit_when_last_window_closed yes

################################################################################
# Keybindings
################################################################################
# Splits
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# Navigate splits
map cmd+alt+left neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up neighboring_window up
map cmd+alt+down neighboring_window down

# Tab navigation
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5

# Font size
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# Scrollback
map cmd+f show_scrollback
