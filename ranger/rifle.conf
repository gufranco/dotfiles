# Ranger rifle.conf - file opener rules
# Symlinked to ~/.config/ranger/rifle.conf

################################################################################
# Text files
################################################################################
mime ^text, label editor = ${VISUAL:-$EDITOR} -- "$@"
mime ^text, label pager  = bat -- "$@"
!mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php|go|java|c|cpp|h|hpp = ${VISUAL:-$EDITOR} -- "$@"
!mime ^text, label pager,  ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php|go|java|c|cpp|h|hpp = bat -- "$@"

################################################################################
# Markdown and documentation
################################################################################
ext md|markdown = glow -- "$@"
ext md|markdown, has $EDITOR = ${VISUAL:-$EDITOR} -- "$@"

################################################################################
# Web
################################################################################
ext x?html?, has open, env DISPLAY = open -- "$@"
ext x?html?, has lynx = lynx -- "$@"

################################################################################
# Video and audio
################################################################################
mime ^video, has iina, env DISPLAY = iina -- "$@"
mime ^video, has vlc, env DISPLAY = vlc -- "$@"
mime ^video, has mpv = mpv -- "$@"
mime ^audio|ogg$, has cmus = cmus-remote -q "$@" && cmus-remote -p
mime ^audio|ogg$, has vlc = vlc -- "$@"

################################################################################
# Images
################################################################################
mime ^image, has open, env DISPLAY = open -- "$@"
mime ^image, has gimp, env DISPLAY = gimp -- "$@"

################################################################################
# PDF and documents
################################################################################
ext pdf, has open, env DISPLAY = open -- "$@"
ext epub|mobi, has calibre = ebook-viewer -- "$@"
ext epub|mobi, has open, env DISPLAY = open -- "$@"

################################################################################
# Archives
################################################################################
ext 7z, has 7z = 7z -p l "$@" | bat --paging=always
ext ace|ar|arc|bz2?|cab|cpio|cpt|deb|dgc|dmg|gz = atool --list --each -- "$@" | bat --paging=always
ext iso|jar|lz|lzh|lzma|lzo|rar|rpm|rz|t7z|tar|tbz|tbz2|tgz = atool --list --each -- "$@" | bat --paging=always
ext tlz|txz|tz|tzo|war|xpi|xz|zip = atool --list --each -- "$@" | bat --paging=always

ext tar|gz|bz2|xz|lz|lzma|lzo|zip|rar|7z, has atool = atool --extract --each -- "$@"

################################################################################
# JSON and YAML
################################################################################
ext json, has jq = jq '.' "$@" | bat -l json
ext yaml|yml, has yq = yq '.' "$@" | bat -l yaml

################################################################################
# Fallback
################################################################################
label open, has open = open -- "$@"
label editor = ${VISUAL:-$EDITOR} -- "$@"
label pager = bat -- "$@"

# Generic file openers
!mime ^text, !ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php|go|java|c|cpp|h|hpp, env DISPLAY, has open = open "$@"
