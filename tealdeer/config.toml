# Tealdeer (tldr) - https://dbrgn.github.io/tealdeer/config.html

[display]
use_pager = false
compact = false

[updates]
auto_update = true
auto_update_interval_hours = 168

################################################################################
# Catppuccin Mocha colors
################################################################################
[style.command_name]
foreground = { r = 137, g = 180, b = 250 }
bold = true

[style.example_text]
foreground = { r = 205, g = 214, b = 244 }

[style.example_code]
foreground = { r = 137, g = 220, b = 235 }

[style.example_variable]
foreground = { r = 203, g = 166, b = 247 }
underline = true

[style.description]
foreground = { r = 186, g = 194, b = 222 }
