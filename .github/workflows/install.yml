---
name: Install
run-name: >-
  Install (${{
    github.event_name == 'schedule' && 'scheduled' ||
    github.event_name == 'workflow_dispatch' && 'manual' ||
    github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) ||
    format('push {0}', github.sha)
  }})

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'
      - '.github/scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  DEBIAN_FRONTEND: noninteractive
  GIT_TERMINAL_PROMPT: "0"

jobs:
  resolve-ubuntu-lts:
    name: Resolve Ubuntu LTS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.lts.outputs.version }}
    steps:
      - name: Query latest LTS
        id: lts
        run: |
          # meta-release-lts is broken (only returns Dapper 6.06 as of Apr 2026),
          # so query meta-release and filter for LTS versions instead
          version=$(curl -fsSL https://changelogs.ubuntu.com/meta-release \
            | grep -B1 'LTS' | grep -oP '^Version: \K[\d.]+' | tail -1)
          echo "Latest Ubuntu LTS: ${version:-failed to resolve}"
          echo "version=${version:-24.04}" >> "$GITHUB_OUTPUT"

  linux:
    name: Ubuntu LTS (x64)
    needs: [resolve-ubuntu-lts]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:${{ needs.resolve-ubuntu-lts.outputs.version }}
      options: --privileged
    timeout-minutes: 60
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Bootstrap container
        run: |
          apt-get update -qq
          apt-get install -y -qq sudo git curl lsb-release gpg ca-certificates software-properties-common
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run install.sh
        run: bash install.sh

      - name: Re-run install.sh (idempotency)
        run: bash install.sh

      - name: Verify symlinks
        run: bash .github/scripts/verify-symlinks.sh

      - name: Verify commands
        run: |
          set -euo pipefail
          errors=0
          cmds="zsh git vim tmux curl wget fzf rg bat eza fdfind delta gh node go starship docker tokei google-chrome-stable gamemoderun mangohud gamescope protontricks"

          for cmd in $cmds; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd ($(command -v "$cmd"))"
            elif [ -x "/usr/games/$cmd" ]; then
              echo "OK: $cmd (/usr/games/$cmd)"
            elif dpkg -l "$cmd" 2>/dev/null | grep -q "^ii"; then
              echo "OK: $cmd (dpkg)"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify Steam
        run: |
          if dpkg -l steam-launcher 2>/dev/null | grep -q "^ii"; then
            echo "OK: steam-launcher"
          else
            echo "FAIL: steam-launcher"
            exit 1
          fi

      - name: Verify Oh My Zsh
        run: bash .github/scripts/verify-ohmyzsh.sh

      - name: Verify permissions
        run: bash .github/scripts/verify-permissions.sh

      - name: Verify gaming setup
        run: bash .github/scripts/verify-gaming.sh

