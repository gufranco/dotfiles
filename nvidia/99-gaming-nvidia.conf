# NVIDIA gaming environment for the graphical session.
# Symlinked to ~/.config/environment.d/99-gaming-nvidia.conf by install.sh.
# systemd exports these to Wayland/GUI apps (Steam included) at login.
#
# These __GL_ variables only take effect on the NVIDIA GPU, i.e. when a game
# runs via PRIME offload. The desktop runs on the iGPU and is unaffected.

# Persist compiled shaders on disk and stop the driver pruning the cache.
# SKIP_CLEANUP is the single highest-impact anti-stutter setting on NVIDIA:
# the default cap is pruned aggressively and forces shader recompiles.
__GL_SHADER_DISK_CACHE=1
__GL_SHADER_DISK_CACHE_SKIP_CLEANUP=1
__GL_SHADER_DISK_CACHE_PATH=${HOME}/.cache/nv

# Multi-thread the GL driver. Helps GPU-bound titles; if a specific game
# regresses on a CPU-bound scene, override it in that game's launch options.
__GL_THREADED_OPTIMIZATIONS=1

# Lower render-ahead for lower latency and steadier frame times.
__GL_MaxFramesAllowed=1
