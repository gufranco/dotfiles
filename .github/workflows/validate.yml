name: Validate Dotfiles

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: |
            vim/plugged
            tmux/plugins
            gnupg/private-keys-v1.d
          ignore_names: |
            .zshrc
            .vimrc
            .tmux.conf

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/
          config_file: .yamllint.yml
          strict: true

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: articulate/actions-markdownlint@v1
        with:
          files: '*.md'
          config: .markdownlint.json
          ignore: |
            vim/plugged
            tmux/plugins

  file-structure:
    name: Validate File Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking for required files..."

          required_files=(
            "install.sh"
            "README.md"
            "LICENSE"
            "zsh/.zshrc"
            "zsh/aliases"
            "zsh/functions"
            "zsh/utilities"
            "zsh/paths"
            "zsh/settings"
            "zsh/startup"
            "git/.gitconfig"
            "vim/.vimrc"
            "tmux/.tmux.conf"
          )

          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done

          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "❌ Missing required files:"
            printf '%s\n' "${missing_files[@]}"
            exit 1
          fi

          echo "✅ All required files present"

      - name: Check for secrets in repository
        run: |
          echo "Checking for potential secrets..."

          # Check for common secret patterns (excluding .gpg files which are encrypted)
          if grep -r -E "(password|secret|token|key).*=.*['\"][^'\"]{20,}" \
             --exclude-dir=".git" \
             --exclude-dir="vim/plugged" \
             --exclude-dir="tmux/plugins" \
             --exclude="*.gpg" \
             --exclude="*.md" \
             .; then
            echo "⚠️ Warning: Potential secrets found in repository"
            echo "Please review the matches above"
            # Don't fail, just warn
          else
            echo "✅ No obvious secrets detected"
          fi

  symlink-validation:
    name: Validate Symlink Logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test symlink function
        run: |
          echo "Testing __safe_link function..."

          # Source utilities
          source ./zsh/utilities

          # Create test files
          mkdir -p /tmp/test_dotfiles/{source,target}
          echo "test content" > /tmp/test_dotfiles/source/testfile

          # Test the __safe_link function
          __safe_link /tmp/test_dotfiles/source/testfile /tmp/test_dotfiles/target/testfile

          # Verify
          if [ -L /tmp/test_dotfiles/target/testfile ]; then
            echo "✅ Symlink created successfully"
          else
            echo "❌ Failed to create symlink"
            exit 1
          fi

          # Cleanup
          rm -rf /tmp/test_dotfiles

  install-dry-run:
    name: Installation Dry Run
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate install script syntax
        run: |
          bash -n install.sh
          echo "✅ install.sh syntax is valid"

      - name: Check install script dependencies
        run: |
          echo "Checking for required commands in install.sh..."

          # Extract command calls and check if they exist
          commands=$(grep -oE '\b(curl|git|brew|apt|gpg|ssh|vim|tmux|zsh)\b' install.sh | sort -u)

          echo "Commands used in install.sh:"
          echo "$commands"
          echo ""
          echo "Available on this system:"
          for cmd in $commands; do
            if command -v "$cmd" &> /dev/null; then
              echo "✅ $cmd"
            else
              echo "⚠️ $cmd (not available - will be installed)"
            fi
          done

  zsh-syntax:
    name: Zsh Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Check Zsh files syntax
        run: |
          echo "Checking Zsh syntax..."

          zsh_files=(
            "zsh/.zshrc"
            "zsh/aliases"
            "zsh/functions"
            "zsh/utilities"
            "zsh/infrastructure"
            "zsh/paths"
            "zsh/settings"
            "zsh/startup"
          )

          errors=0
          for file in "${zsh_files[@]}"; do
            echo "Checking $file..."
            if zsh -n "$file" 2>&1; then
              echo "  ✅ $file"
            else
              echo "  ❌ $file has syntax errors"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ Found $errors file(s) with syntax errors"
            exit 1
          fi

          echo ""
          echo "✅ All Zsh files have valid syntax"

  brewfile-validation:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Brewfile syntax
        run: |
          echo "Validating Brewfile..."

          # Check if Brewfile is valid Ruby syntax
          ruby -c Brewfile

          echo "✅ Brewfile syntax is valid"

      - name: Check Brewfile for issues
        run: |
          echo "Running brew bundle check..."
          brew bundle check --file=Brewfile --no-lock || true
          echo "Note: Some packages may not be available, which is expected"

  vim-config:
    name: Validate Vim Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vim
        run: |
          sudo apt-get update
          sudo apt-get install -y vim

      - name: Check Vim configuration syntax
        run: |
          echo "Checking .vimrc syntax..."
          vim -u vim/.vimrc -c 'source %' -c 'quit' 2>&1 | tee /tmp/vim_check.log

          if grep -i "error" /tmp/vim_check.log; then
            echo "❌ Found errors in .vimrc"
            exit 1
          fi

          echo "✅ .vimrc syntax is valid"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [shellcheck, yaml-lint, markdown-lint, file-structure, symlink-validation, install-dry-run, zsh-syntax, brewfile-validation, vim-config]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "📊 Validation Summary"
          echo "===================="
          echo ""
          echo "All validation checks completed!"
          echo ""
          echo "Check individual job results above for details."

