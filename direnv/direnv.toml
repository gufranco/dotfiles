# direnv settings - https://direnv.net/man/direnv.toml.1.html
# Symlinked to ~/.config/direnv/direnv.toml

[global]
# Suppress the diff output when loading/unloading an .envrc
hide_env_diff = true

# Warn instead of error when .envrc takes too long
warn_timeout = "10s"

# Allow directories under ~/Workspace automatically
[whitelist]
prefix = ["~/Workspace"]
