################################################################################
# Terminal Configuration
################################################################################
# RGB color support for modern terminals
# Uses tmux-256color for better color support (fallback to screen-256color)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:RGB'
set -ga terminal-overrides ',tmux-256color:RGB'
set -ga terminal-overrides ',screen-256color:RGB'

################################################################################
# Custom Settings (not covered by tmux-sensible)
################################################################################
# Index windows and panes starting at 1 instead of 0
set -g base-index 1
set-window-option -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Use vim key bindings in copy mode
set-window-option -g mode-keys vi

# Enable mouse support (click to focus, drag to resize)
set -g mouse on

# Window title settings
set -g allow-rename off
set -g set-titles on
set-window-option -g automatic-rename on

# Silence tmux notifications
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set-window-option -g monitor-activity off
set -g bell-action none

################################################################################
# Plugins
################################################################################
################################################################################
# Core: Plugin Manager
################################################################################
set -g @plugin 'tmux-plugins/tpm'                    # Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'         # Sensible defaults for tmux

################################################################################
# Theme
################################################################################
# Tokyo Night theme - dark theme with beautiful colors
# Usage: Automatically applied
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme 'night'
set -g @tokyo-night-tmux_transparent 1
set -g @tokyo-night-tmux_window_id_style 'none'
set -g @tokyo-night-tmux_pane_id_style 'hide'
set -g @tokyo-night-tmux_zoom_id_style 'hide'
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format 'relative'

################################################################################
# Sessions Management
################################################################################
# Session Wizard - fzf-based session and project switching
# Usage: Ctrl+b T - Opens fuzzy finder to switch/create sessions from recent dirs
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @session-wizard 'T'

# tmux-resurrect - Save and restore tmux environment
# Usage: Ctrl+b Ctrl+s (save), Ctrl+b Ctrl+r (restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# tmux-continuum - Automatic restore and continuous saving
# Usage: Automatically saves every 15 minutes, restores on server start
set -g @plugin 'tmux-plugins/tmux-continuum'

################################################################################
# Pane Management
################################################################################
# tmux-pain-control - Enhanced pane navigation and splitting
# Usage:
#   Ctrl+b | (split horizontal), Ctrl+b - (split vertical)
#   Ctrl+b % (split horizontal), Ctrl+b " (split vertical)
#   hjkl (navigate), HJKL (resize)
set -g @plugin 'tmux-plugins/tmux-pain-control'

################################################################################
# Clipboard Integration
################################################################################
# tmux-yank - Copy to system clipboard
# Usage: In copy mode, y to copy to clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
set -g set-clipboard on

################################################################################
# Text Extraction & Selection
################################################################################
# Extrakto - Extract URLs, file paths, hashes with fuzzy finder
# Usage: Ctrl+b Ctrl+a - Shows all URLs, paths, hashes, select to copy
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'C-a'

# tmux-fingers - Fast text selection with single key press
# Usage: Ctrl+b f - Highlights selectable text, press key to copy
set -g @plugin 'Morantron/tmux-fingers'

################################################################################
# Mouse & Scrolling
################################################################################
# tmux-better-mouse-mode - Improved mouse scrolling and behavior
# Usage: Automatic - scroll smoothly, scroll in moused-over pane
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-down-exit-copy-mode "on"
set -g @scroll-without-changing-pane "on"
set -g @scroll-in-moused-over-pane "on"
set -g @scroll-speed-num-lines-per-scroll "1"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# tmux-mighty-scroll - Better scrolling in vim, less, man, etc.
# Usage: Automatic - provides better scrolling in fullscreen apps
set -g @plugin 'noscript/tmux-mighty-scroll'

################################################################################
# Help & Utilities
################################################################################
# tmux-menus - Popup menus for common actions
# Usage: F12 - Opens context menu
set -g @plugin 'jaclu/tmux-menus'
set -g @menus_trigger F12

# tmux-cowboy - Kill sessions when SSH disconnects
# Usage: Ctrl+b K - Kill current session
set -g @plugin 'tmux-plugins/tmux-cowboy'

################################################################################
# Start TPM
################################################################################
run '~/.tmux/plugins/tpm/tpm'
