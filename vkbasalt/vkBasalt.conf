# vkBasalt configuration.
# Symlinked to ~/.config/vkBasalt/vkBasalt.conf by install.sh.
# Enable per-game with `ENABLE_VKBASALT=1 %command%`, toggle in-game with Home.
#
# CAS (Contrast Adaptive Sharpening) recovers perceived detail cheaply, which
# pairs well with rendering below native resolution and upscaling on entry GPUs.

effects = cas
casSharpness = 0.4
toggleKey = Home
enableOnLaunch = True
