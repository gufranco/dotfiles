################################################################################
# Terminal & Display
################################################################################
# True color and terminal capabilities (tmux 3.2+)
# set -s (not -sa) on the first entry replaces the array, preventing
# accumulation when the config is reloaded with Prefix+r.
# xterm* covers xterm-256color, xterm-kitty, xterm-ghostty, xterm-iterm2.
set -g default-terminal "tmux-256color"
set -s terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:RGB'
set -sa terminal-features ',iTerm2:RGB'
set -sa terminal-features ',tmux-256color:RGB'
set -sa terminal-features ',screen*:title:RGB'
set -sa terminal-features ',rxvt*:ignorefkeys'

# Kitty cursor visibility fix (not expressible as a terminal-feature)
set -s terminal-overrides 'xterm-kitty:cnorm=\E[?12l\E[?25h'

################################################################################
# Performance & Behavior
################################################################################
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size (from default 2000)
set -g history-limit 50000

# Tmux messages are displayed for 4 seconds
set -g display-time 4000

# Focus events enabled for terminals that support them
set -g focus-events on

# Emacs key bindings in tmux command prompt (prefix + :)
set -g status-keys emacs

# Allow longer time between repeated key presses
set -g repeat-time 1000

# Extended keys support for Control+Shift bindings (tmux 3.2+)
# Auto-detects terminals that support CSI u mode (Ghostty, iTerm2, mintty, xterm)
%if #{>=:#{version},3.2}
set -g extended-keys #{?#{||:#{m/ri:mintty|iTerm,#{TERM_PROGRAM}},#{!=:#{XTERM_VERSION},}},on,off}
%endif

################################################################################
# Windows & Panes
################################################################################
# Index windows and panes starting at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Use vim key bindings in copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Window title settings
set -g allow-rename off
set -g set-titles on
set -g set-titles-string '#S:#W'
setw -g automatic-rename on

# Silence notifications
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Clipboard integration
set -g set-clipboard on

################################################################################
# Keybindings
################################################################################

# Pane Navigation (Vim-style)
# Usage: Prefix + h/j/k/l - Navigate left/down/up/right
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window Navigation
# Usage: Prefix + Tab - Switch to last active window
bind Tab last-window

# Pane Splitting (keeps current path)
# Usage:
#   Prefix + | - Split horizontal (keeps current directory)
#   Prefix + \ - Split horizontal full-width
#   Prefix + - - Split vertical (keeps current directory)
#   Prefix + _ - Split vertical full-height
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -fh -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"

# Override default splits to keep current path
# Usage: Prefix + " or % - Default splits now keep directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reload Configuration
# Usage: Prefix + r - Reload tmux config and show confirmation
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"

# Edit Configuration
# Usage: Prefix + e - Open tmux config in $EDITOR, reload on exit
bind e new-window -n "~/.tmux.conf" sh -c '_E=${VISUAL:-${EDITOR:-vim}}; case "$_E" in *vim*) "$_E" -c ":set syntax=tmux" ~/.tmux.conf;; *) "$_E" ~/.tmux.conf;; esac && tmux source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"'

# New Window in Current Path
# Usage: Prefix + c - Create new window in current directory
bind c new-window -c "#{pane_current_path}"

# Session Navigation
# Usage:
#   Prefix + BTab (Shift+Tab) - Switch to last session
#   Prefix + C-c - Create new session
#   Prefix + C-f - Find session (opens command prompt to search)
bind BTab switch-client -l
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Detach and Rename
# Usage:
#   Prefix + Q - Detach from tmux session
#   Prefix + A - Rename current window (GNU screen convention)
bind Q detach-client
bind A command-prompt -I "#W" { rename-window "%%" }

# Scrollback Search
# Usage:
#   Prefix + W - Open scrollback in vim (read-only, cursor at bottom)
#   Prefix + / - Search scrollback with fzf, selected line copied to tmux buffer
bind W run-shell 'f=$(mktemp "${TMPDIR:-/tmp}"/tmux-scrollback.XXXXXX) && tmux capture-pane -S -50000 -p > "$f" && tmux new-window "vim -R +\"normal G\" \"$f\"; rm -f \"$f\""'
bind / run-shell 'f=$(mktemp "${TMPDIR:-/tmp}"/tmux-scrollback.XXXXXX) && tmux capture-pane -S -50000 -p > "$f" && tmux new-window "selected=\$(fzf --tac --no-sort < \"$f\") && [ -n \"\$selected\" ] && printf \"%s\" \"\$selected\" | tmux load-buffer - && tmux display-message \"Copied to tmux buffer\"; rm -f \"$f\""'

# Clear History
# Usage: Prefix + Ctrl+k - Clear scrollback buffer
bind C-k clear-history \; display "History cleared!"

# Clear Screen and History
# Usage: Prefix + C-l - Clear screen and scrollback history
# Sends C-l to terminal (clears screen) then clears tmux history
# Note: This requires prefix, use -n for no-prefix version (may interfere with normal C-l)
bind C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Copy Mode (Vim-style)
# Usage:
#   Prefix + [ - Enter copy mode
#   Prefix + Enter - Enter copy mode (alternative shortcut)
#   v - Start selection (visual mode)
#   C-v - Rectangle selection
#   H - Move to start of line
#   L - Move to end of line
#   Escape - Cancel selection and exit copy mode
#   y - Copy selection and exit (handled by tmux-yank plugin)
#   Y - Copy and paste immediately (from tmux-yank)
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Paste Buffers
# Usage:
#   Prefix + p - Paste from most recent buffer
#   Prefix + P - Choose which buffer to paste from (interactive)
# Use Prefix + # to list buffers.
bind p paste-buffer -p
bind P choose-buffer

################################################################################
# Plugins
################################################################################
# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Yoru Revamped
set -g @plugin 'gufranco/yoru-revamped-tmux'
set -g @yoru_revamped_dashboard_key "F9"
set -g @yoru_revamped_refresh_rate 10
set -g @yoru_revamped_widgets_order "system,music,context"
set -g @yoru_revamped_show_system 1
set -g @yoru_revamped_system_cpu 1
set -g @yoru_revamped_system_gpu 0
set -g @yoru_revamped_system_memory 1
set -g @yoru_revamped_system_swap 0
set -g @yoru_revamped_system_disk 1
set -g @yoru_revamped_system_disk_path "/"
set -g @yoru_revamped_system_battery 0
set -g @yoru_revamped_system_battery_threshold 20
set -g @yoru_revamped_show_git 0
set -g @yoru_revamped_show_netspeed 0
set -g @yoru_revamped_show_music 1
set -g @yoru_revamped_music_show_artist 1
set -g @yoru_revamped_music_show_progress 1
set -g @yoru_revamped_music_show_time 1
set -g @yoru_revamped_music_max_title 25
set -g @yoru_revamped_show_context 1
set -g @yoru_revamped_context_weather 1
set -g @yoru_revamped_context_weather_units "m"
set -g @yoru_revamped_context_date_format MD
set -g @yoru_revamped_context_time_format 24H
set -g @yoru_revamped_context_timezone 1
set -g @yoru_revamped_context_compact_timezone 1
set -g @yoru_revamped_context_timezones "America/Los_Angeles,America/New_York"

# Tiling Revamped - i3-like BSP tiling window manager
# 8 layouts, 11 operations, 16 BSP orientations, zero dependencies.
#
# Prefix mode: all tiling keys use Prefix + key.
#
# Layouts:
#   Prefix + d     - Dwindle (BSP cascade, default for new windows)
#   Prefix + D     - Spiral (BSP with rotating split direction)
#   Prefix + v     - Main-vertical (master left, stack right)
#   Prefix + V     - Main-horizontal (master top, stack bottom)
#   Prefix + o     - Cycle to next layout in sequence
#   Prefix + P     - Layout picker (fzf popup with ASCII previews)
#   (grid, main-center, monocle, deck also available via cycle/picker)
#
# Operations:
#   Prefix + m     - Promote focused pane to master
#   Prefix + R     - Rotate layout 90 degrees
#   Prefix + F     - Flip layout horizontally
#   Prefix + C-n   - Circulate pane contents (shift all one position)
#   Prefix + C-d   - Autosplit along longest axis (i3-like)
#   Prefix + =     - Balance panes (equalize within layout)
#   Prefix + B     - Equalize panes (even distribution, ignore layout)
#   Prefix + }     - Grow master pane by 5%
#   Prefix + {     - Shrink master pane by 5%
#
# Marks and Scratchpads:
#   Prefix + N     - Mark pane with a name
#   Prefix + G     - Jump to marked pane (fzf picker)
#   Prefix + g     - Toggle floating scratchpad popup
#
# BSP Orientation: 4-char string controlling cascade direction.
#   Position 1: t/b (top/bottom), Position 2: l/r (left/right)
#   Position 3: h/v (horizontal/vertical), Position 4: c/s (corner/spiral)
#   Default: brvc (bottom-right, vertical, corner)
set -g @plugin 'gufranco/tmux-tiling-revamped'

# Behavior
set -g @tiling_revamped_auto_apply 1
set -g @tiling_revamped_default_layout "dwindle"
set -g @tiling_revamped_master_ratio 60
set -g @tiling_revamped_resize_step 5
set -g @tiling_revamped_alt_keys 0
# set -g @tiling_revamped_navigator 1  # Requires working Alt key (Ghostty macos-option-as-alt)

# Remap keys that conflict with existing prefix bindings
# See README key conflict table for full list
set -g @tiling_revamped_key_balance "="
set -g @tiling_revamped_key_rotate "R"
set -g @tiling_revamped_key_flip "F"
set -g @tiling_revamped_key_circulate "C-n"
set -g @tiling_revamped_key_sync ""
set -g @tiling_revamped_key_jump "G"
set -g @tiling_revamped_key_mark "N"
set -g @tiling_revamped_key_master_grow "}"
set -g @tiling_revamped_key_master_shrink "{"
set -g @tiling_revamped_key_pick_layout "P"

# tmux-resurrect - Save and restore tmux environment
# Usage: Prefix + Ctrl+s (save), Prefix + R (restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-restore 'R'

# tmux-yank - Copy to system clipboard
# Usage: In copy mode, y to copy to clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-mighty-scroll - Better scrolling in vim, less, man, etc.
# Usage: Automatic - Provides better scrolling in fullscreen apps
set -g @plugin 'noscript/tmux-mighty-scroll'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
