# Broot - https://dystroy.org/broot
# Symlinked to ~/.config/broot/conf.toml

################################################################################
# General
################################################################################
default_flags = "ghp"
date_time_format = "%Y-%m-%d %H:%M"
show_selection_mark = true
true_colors = true
icon_theme = "nerdfont"
modal = false

################################################################################
# Terminal title
################################################################################
terminal_title = "{file}"

################################################################################
# Preview
################################################################################
[content_search]
max_file_size = "10MB"

################################################################################
# Quit on last cancel (Esc once to quit if nothing to cancel)
################################################################################
quit_on_last_cancel = true

################################################################################
# Special paths
################################################################################
[special-paths]
"~/.dotfiles" = "enter"
"~/Workspace" = "enter"
"/dev" = "hide"
"/proc" = "hide"
"/sys" = "hide"
"node_modules" = "hide"
".git" = "hide"
"target" = "hide"
".next" = "hide"
"dist" = "hide"
"build" = "hide"
"coverage" = "hide"

################################################################################
# Verbs
################################################################################
[[verbs]]
key = "ctrl-c"
execution = ":quit"

[[verbs]]
invocation = "edit"
shortcut = "e"
key = "ctrl-e"
apply_to = "text_file"
execution = "$EDITOR {file}"

[[verbs]]
invocation = "view"
shortcut = "v"
apply_to = "text_file"
execution = "bat --paging=always {file}"

[[verbs]]
invocation = "create {subpath}"
shortcut = "cr"
execution = "$EDITOR {directory}/{subpath}"

[[verbs]]
key = "ctrl-r"
execution = ":toggle_hidden"

[[verbs]]
key = "ctrl-f"
internal = ":input_go"
set_working_dir = true

[[verbs]]
invocation = "terminal"
key = "ctrl-t"
execution = "$SHELL"
set_working_dir = true
leave_broot = false

