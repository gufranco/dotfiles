---
name: Install

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'
  pull_request:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'

env:
  CI: "1"
  DEBIAN_FRONTEND: noninteractive
  GIT_TERMINAL_PROMPT: "0"

jobs:
  ubuntu-arm-version-drift:
    name: Ubuntu ARM version drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Detect version drift
        run: |
          latest=$(lsb_release -rs)
          pinned="24.04"
          if [ "$latest" != "$pinned" ]; then
            echo "::error::ubuntu-latest moved to ${latest} but ARM runner is still pinned to ${pinned}. Update to ubuntu-${latest}-arm in the workflow."
            exit 1
          fi

  linux:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            name: Ubuntu LTS (x64)
          - runner: ubuntu-24.04-arm
            name: Ubuntu LTS (arm64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run install.sh
        run: bash install.sh

      - name: Verify symlinks
        run: |
          set -euo pipefail
          errors=0
          check() {
            if [ -L "$2" ]; then
              if [ -e "$2" ]; then
                echo "OK: $1"
              else
                echo "FAIL: $1 ($2 is a dangling symlink)"
                errors=$((errors + 1))
              fi
            else
              echo "FAIL: $1 ($2 is not a symlink)"
              errors=$((errors + 1))
            fi
          }

          # Shell & Editor
          check "zshrc"       "$HOME/.zshrc"
          check "gitconfig"   "$HOME/.gitconfig"
          check "vimrc"       "$HOME/.vimrc"
          check "vim"         "$HOME/.vim"
          check "tmux.conf"   "$HOME/.tmux.conf"
          check "tmux"        "$HOME/.tmux"

          # Network
          check "curlrc"      "$HOME/.curlrc"
          check "wgetrc"      "$HOME/.wgetrc"
          check "telnetrc"    "$HOME/.telnetrc"

          # Search & Input
          check "inputrc"     "$HOME/.inputrc"
          check "ripgreprc"   "$HOME/.ripgreprc"
          check "fdrc"        "$HOME/.fdrc"

          # Node.js
          check "npmrc"       "$HOME/.npmrc"
          check "yarnrc"      "$HOME/.yarnrc.yml"
          check "pnpmrc"      "$HOME/.pnpmrc"

          # Email
          check "muttrc"      "$HOME/.muttrc"
          check "mutt"        "$HOME/.mutt"
          check "mailcap"     "$HOME/.mailcap"

          # Security
          check "gnupg"       "$HOME/.gnupg"
          check "ssh"         "$HOME/.ssh"

          # App configs
          check "htop"        "$HOME/.config/htop/htoprc"
          check "ghostty"     "$HOME/.config/ghostty"
          check "kitty"       "$HOME/.config/kitty/kitty.conf"
          check "bat-config"  "$HOME/.config/bat/config"
          check "bat-themes"  "$HOME/.config/bat/themes"
          check "eza"         "$HOME/.config/eza"
          check "cmus"        "$HOME/.config/cmus/rc"
          check "yazi"        "$HOME/.config/yazi"
          check "gh"          "$HOME/.config/gh/config.yml"
          check "glab"        "$HOME/.config/glab-cli/config.yml"
          check "tealdeer"    "$HOME/.config/tealdeer/config.toml"
          check "bottom"      "$HOME/.config/bottom/bottom.toml"
          check "lazygit"     "$HOME/.config/lazygit/config.yml"
          check "lazydocker"  "$HOME/.config/lazydocker/config.yml"
          check "k9s"         "$HOME/.config/k9s/config.yml"

          # Linux-only
          check "conkyrc"     "$HOME/.conkyrc"

          exit $errors

      - name: Verify commands
        run: |
          set -euo pipefail
          errors=0
          for cmd in zsh git vim tmux curl wget fzf rg bat eza fd delta gh node go starship docker; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd ($(command -v "$cmd"))"
            elif dpkg -l "$cmd" 2>/dev/null | grep -q "^ii"; then
              echo "OK: $cmd (dpkg)"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify Oh My Zsh
        run: |
          set -euo pipefail
          errors=0
          for dir in \
            "$HOME/.oh-my-zsh" \
            "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting" \
            "$HOME/.oh-my-zsh/custom/plugins/zsh-completions" \
            "$HOME/.oh-my-zsh/custom/plugins/fzf-tab" \
            "$HOME/.oh-my-zsh/custom/themes/spaceship-prompt"; do
            if [ -d "$dir/.git" ]; then
              echo "OK: $(basename "$dir")"
            else
              echo "FAIL: $(basename "$dir") not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify permissions
        run: |
          set -euo pipefail
          check_perm() {
            local path="$1" expected="$2"
            actual=$(stat -Lc %a "$path" 2>/dev/null || echo "missing")
            if [ "$actual" = "$expected" ]; then
              echo "OK: $path ($actual)"
            else
              echo "FAIL: $path (expected $expected, got $actual)"
              return 1
            fi
          }
          check_perm "$HOME/.gnupg" "700"
          check_perm "$HOME/.ssh" "700"

  macos:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            name: macOS Sequoia (x64)
          - runner: macos-26-intel
            name: macOS Tahoe (x64)
          - runner: macos-latest
            name: macOS latest (arm64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run install.sh
        run: bash install.sh

      - name: Verify symlinks
        run: |
          set -euo pipefail
          errors=0
          check() {
            if [ -L "$2" ]; then
              if [ -e "$2" ]; then
                echo "OK: $1"
              else
                echo "FAIL: $1 ($2 is a dangling symlink)"
                errors=$((errors + 1))
              fi
            else
              echo "FAIL: $1 ($2 is not a symlink)"
              errors=$((errors + 1))
            fi
          }

          # Shell & Editor
          check "zshrc"       "$HOME/.zshrc"
          check "gitconfig"   "$HOME/.gitconfig"
          check "vimrc"       "$HOME/.vimrc"
          check "vim"         "$HOME/.vim"
          check "tmux.conf"   "$HOME/.tmux.conf"
          check "tmux"        "$HOME/.tmux"

          # Network
          check "curlrc"      "$HOME/.curlrc"
          check "wgetrc"      "$HOME/.wgetrc"
          check "telnetrc"    "$HOME/.telnetrc"

          # Search & Input
          check "inputrc"     "$HOME/.inputrc"
          check "ripgreprc"   "$HOME/.ripgreprc"
          check "fdrc"        "$HOME/.fdrc"

          # Node.js
          check "npmrc"       "$HOME/.npmrc"
          check "yarnrc"      "$HOME/.yarnrc.yml"
          check "pnpmrc"      "$HOME/.pnpmrc"

          # Email
          check "muttrc"      "$HOME/.muttrc"
          check "mutt"        "$HOME/.mutt"
          check "mailcap"     "$HOME/.mailcap"

          # Security
          check "gnupg"       "$HOME/.gnupg"
          check "ssh"         "$HOME/.ssh"

          # App configs
          check "htop"        "$HOME/.config/htop/htoprc"
          check "ghostty"     "$HOME/.config/ghostty"
          check "kitty"       "$HOME/.config/kitty/kitty.conf"
          check "bat-config"  "$HOME/.config/bat/config"
          check "bat-themes"  "$HOME/.config/bat/themes"
          check "eza"         "$HOME/.config/eza"
          check "cmus"        "$HOME/.config/cmus/rc"
          check "yazi"        "$HOME/.config/yazi"
          check "gh"          "$HOME/.config/gh/config.yml"
          check "glab"        "$HOME/.config/glab-cli/config.yml"
          check "tealdeer"    "$HOME/.config/tealdeer/config.toml"
          check "bottom"      "$HOME/.config/bottom/bottom.toml"
          check "lazygit"     "$HOME/.config/lazygit/config.yml"
          check "lazydocker"  "$HOME/.config/lazydocker/config.yml"
          check "k9s"         "$HOME/.config/k9s/config.yml"
          check "k9s-skins"   "$HOME/.config/k9s/skins"

          exit $errors

      - name: Verify Homebrew packages
        run: |
          set -euo pipefail
          eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null || /usr/local/bin/brew shellenv 2>/dev/null)"
          errors=0
          for cmd in bat eza fzf fd rg delta git zsh tmux vim gh node nvm bun pnpm; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd ($(command -v "$cmd"))"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify Oh My Zsh
        run: |
          set -euo pipefail
          errors=0
          for dir in \
            "$HOME/.oh-my-zsh" \
            "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting" \
            "$HOME/.oh-my-zsh/custom/plugins/zsh-completions" \
            "$HOME/.oh-my-zsh/custom/plugins/fzf-tab" \
            "$HOME/.oh-my-zsh/custom/themes/spaceship-prompt"; do
            if [ -d "$dir/.git" ]; then
              echo "OK: $(basename "$dir")"
            else
              echo "FAIL: $(basename "$dir") not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify permissions
        run: |
          set -euo pipefail
          check_perm() {
            local path="$1" expected="$2"
            actual=$(stat -Lf %Lp "$path" 2>/dev/null || echo "missing")
            if [ "$actual" = "$expected" ]; then
              echo "OK: $path ($actual)"
            else
              echo "FAIL: $path (expected $expected, got $actual)"
              return 1
            fi
          }
          check_perm "$HOME/.gnupg" "700"
          check_perm "$HOME/.ssh" "700"

  idempotency:
    name: Idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: First install
        run: bash install.sh

      - name: Second install
        run: bash install.sh

      - name: Verify final state
        run: |
          set -euo pipefail
          errors=0

          # Symlinks exist and are not dangling
          for link in \
            "$HOME/.zshrc" \
            "$HOME/.gitconfig" \
            "$HOME/.vimrc" \
            "$HOME/.vim" \
            "$HOME/.tmux.conf" \
            "$HOME/.tmux" \
            "$HOME/.curlrc" \
            "$HOME/.inputrc" \
            "$HOME/.npmrc"; do
            if [ -L "$link" ] && [ -e "$link" ]; then
              echo "OK: $link"
            else
              echo "FAIL: $link (missing or dangling)"
              errors=$((errors + 1))
            fi
          done

          # Key commands available
          for cmd in zsh git vim tmux fzf rg bat eza fd delta starship; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done

          # Permissions intact
          for dir in "$HOME/.gnupg" "$HOME/.ssh"; do
            perm=$(stat -Lc %a "$dir" 2>/dev/null || echo "missing")
            if [ "$perm" = "700" ]; then
              echo "OK: $dir ($perm)"
            else
              echo "FAIL: $dir (expected 700, got $perm)"
              errors=$((errors + 1))
            fi
          done

          exit $errors
