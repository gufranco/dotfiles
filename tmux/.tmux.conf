################################################################################
# Settings
################################################################################
# Enable true colors
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse
set-option -g mouse on

# Increase repeat time for repeatable commands
set -g repeat-time 1000

# Start window index at 1 instead of 0
set -g base-index 1

# Start pane index at 1 instead of 0
set-window-option -g pane-base-index 1

# Re-number windows when one is closed
set -g renumber-windows on

# Use vim key bindings
set-window-option -g mode-keys vi

# Automatically set window title
set-option -g allow-rename off
set-option -g set-titles on
set-option -g status-position bottom
set-window-option -g automatic-rename on

# Shut up, tmux
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

################################################################################
# Theme
################################################################################
set -g status-justify "left"
set -g status-left-length "100"
set -g status "on"
set -g status-right-length "160"
set -g status-right-style none
set -g message-style bg=colour2,fg=colour0
set -g status-style none
set -g pane-border-style bg=default
set -g pane-active-border-style bg=default,fg=colour2
set -g pane-border-style fg=colour240
set -g status-left-style none
set-window-option -g window-status-style bg=default,fg=colour242,none
set-window-option -g window-status-current-style bg=default,fg=colour242
set-window-option -g window-status-activity-style fg=colour2,none
set-window-option -g window-status-separator ""
set -g status-left "#[fg=colour242] #S | #[fg=colour2,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=colour242,nobold,nounderscore,noitalics]CPU: #{cpu_percentage} - #{cpu_temp} | RAM: #{ram_percentage} | Battery: #{battery_percentage} | %d/%m/%Y %H:%M"
set-window-option -g window-status-format "#[fg=colour242,nobold,nounderscore,noitalics] #[fg=colour242] #I #W #[fg=colour0,nobold,nounderscore,noitalics]"
set-window-option -g window-status-current-format "#[fg=colour0,bold,nounderscore,noitalics] #[bg=colour235,fg=colour255] #I #W #[fg=colour0,nobold,nounderscore,noitalics]"

################################################################################
# Plugins
################################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
  set -g @scroll-speed-num-lines-per-scroll "1"
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @resurrect-strategy-vim 'session'
  set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

################################################################################
# TPM
################################################################################
run '~/.tmux/plugins/tpm/tpm'
