# MangoHud configuration.
# Symlinked to ~/.config/MangoHud/MangoHud.conf by install.sh.
# With gamescope use `--mangoapp`; standalone use `mangohud %command%`.

# No global frame cap here; cap per-game via gamescope -r or a launch var.
fps_limit=0

# GPU metrics
gpu_stats
gpu_temp
gpu_power
gpu_load_change
gpu_name
vram

# CPU metrics
cpu_stats
cpu_temp
cpu_load_change

# System
ram
vulkan_driver
resolution

# Frame timing (the numbers that matter for "SteamOS smoothness")
fps
frametime
frame_timing

# Layout
position=top-left
font_size=20
background_alpha=0.4
round_corners=6

# Toggle overlay with Right Shift + F12
toggle_hud=Shift_R+F12
