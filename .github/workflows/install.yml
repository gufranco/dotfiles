---
name: Install
run-name: >-
  Install (${{
    github.event_name == 'schedule' && 'scheduled' ||
    github.event_name == 'workflow_dispatch' && 'manual' ||
    github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) ||
    format('push {0}', github.sha)
  }})

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [master]
    paths:
      - 'install.sh'
      - 'zsh/**'
      - 'Brewfile'
      - '.github/workflows/install.yml'
      - '.github/scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  DEBIAN_FRONTEND: noninteractive
  GIT_TERMINAL_PROMPT: "0"

jobs:
  ubuntu-arm-version-drift:
    name: Ubuntu ARM version drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Detect version drift
        run: |
          latest=$(lsb_release -rs)
          pinned="24.04"
          if [ "$latest" != "$pinned" ]; then
            echo "::error::ubuntu-latest moved to ${latest} but ARM runner is still pinned to ${pinned}. Update to ubuntu-${latest}-arm in the workflow."
            exit 1
          fi

  linux:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            name: Ubuntu LTS (x64)
          - runner: ubuntu-24.04-arm
            name: Ubuntu LTS (arm64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run install.sh
        run: bash install.sh

      - name: Re-run install.sh (idempotency)
        run: bash install.sh

      - name: Verify symlinks
        run: bash .github/scripts/verify-symlinks.sh

      - name: Verify commands
        run: |
          set -euo pipefail
          errors=0
          for cmd in zsh git vim tmux curl wget fzf rg bat eza fdfind delta gh node go starship docker; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd ($(command -v "$cmd"))"
            elif dpkg -l "$cmd" 2>/dev/null | grep -q "^ii"; then
              echo "OK: $cmd (dpkg)"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify Oh My Zsh
        run: bash .github/scripts/verify-ohmyzsh.sh

      - name: Verify permissions
        run: bash .github/scripts/verify-permissions.sh

  macos:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            name: macOS Sequoia (x64)
          - runner: macos-26-intel
            name: macOS Tahoe (x64)
          - runner: macos-latest
            name: macOS latest (arm64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run install.sh
        run: bash install.sh

      - name: Re-run install.sh (idempotency)
        run: bash install.sh

      - name: Verify symlinks
        run: bash .github/scripts/verify-symlinks.sh

      - name: Verify Homebrew packages
        run: |
          set -euo pipefail
          eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null || /usr/local/bin/brew shellenv 2>/dev/null)"
          errors=0
          for cmd in bat eza fzf fd rg delta git zsh tmux vim gh node bun pnpm; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd ($(command -v "$cmd"))"
            else
              echo "FAIL: $cmd not found"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Verify Oh My Zsh
        run: bash .github/scripts/verify-ohmyzsh.sh

      - name: Verify permissions
        run: bash .github/scripts/verify-permissions.sh
