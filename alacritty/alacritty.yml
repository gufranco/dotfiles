env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 120
    lines: 40
  position:
    x: 0
    y: 0
  dynamic_padding: false
  decorations: full
  startup_mode: Maximized
  title: Alacritty
  dynamic_title: true

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: Hack Nerd Font
    style: Regular
  bold:
    style: Bold
  italic:
    style: Italic
  bold_italic:
    style: Bold Italic
  size: 10.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

colors:
  primary:
    background: '0x282a36'
    foreground: '0xf8f8f2'
  cursor:
    text: '0x44475a'
    cursor: '0xf8f8f2'
  selection:
    text: '0xf8f8f2'
    background: '0x44475a'
  normal:
    black:   '0x000000'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xbd93f9'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xbfbfbf'
  bright:
    black:   '0x4d4d4d'
    red:     '0xff6e67'
    green:   '0x5af78e'
    yellow:  '0xf4f99d'
    blue:    '0xcaa9fa'
    magenta: '0xff92d0'
    cyan:    '0x9aedfe'
    white:   '0xe6e6e6'
  dim:
    black:   '0x14151b'
    red:     '0xff2222'
    green:   '0x1ef956'
    yellow:  '0xebf85b'
    blue:    '0x4d5b86'
    magenta: '0xff46b0'
    cyan:    '0x59dffc'
    white:   '0xe6e6d1'
  indexed_colors: []

key_bindings:
  - { key: D,     mods: Command,       chars: "\x02\x76" }
  - { key: D,     mods: Command|Shift, chars: "\x02\x73" }
  - { key: W,     mods: Command,       chars: "\x02\x78" }
  - { key: H,     mods: Command,       chars: "\x02\x68" }
  - { key: J,     mods: Command,       chars: "\x02\x6a" }
  - { key: K,     mods: Command,       chars: "\x02\x6b" }
  - { key: L,     mods: Command,       chars: "\x02\x6c" }
  - { key: T,     mods: Command,       chars: "\x02\x63" }
  - { key: Key1,  mods: Command,       chars: "\x02\x31" }
  - { key: Key2,  mods: Command,       chars: "\x02\x32" }
  - { key: Key3,  mods: Command,       chars: "\x02\x33" }
  - { key: Key4,  mods: Command,       chars: "\x02\x34" }
  - { key: Key5,  mods: Command,       chars: "\x02\x35" }
  - { key: Key6,  mods: Command,       chars: "\x02\x36" }
  - { key: Key7,  mods: Command,       chars: "\x02\x37" }
  - { key: Key8,  mods: Command,       chars: "\x02\x38" }
  - { key: Key9,  mods: Command,       chars: "\x02\x39" }
  - { key: Left,  mods: Command,       chars: "\x02\x48" }
  - { key: Down,  mods: Command,       chars: "\x02\x4a" }
  - { key: Up,    mods: Command,       chars: "\x02\x4b" }
  - { key: Right, mods: Command,       chars: "\x02\x4c" }
