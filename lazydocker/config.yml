# Lazydocker - https://github.com/jesseduffield/lazydocker
# On macOS: ~/Library/Application Support/jesseduffield/lazydocker

gui:
  scrollHeight: 2
  scrollPastBottom: true
  theme:
    lightTheme: false
    activeBorderColor:
      - '#7aa2f7'
      - bold
    inactiveBorderColor:
      - '#414868'
    selectedLineBgColor:
      - '#283457'
    optionsTextColor:
      - '#7aa2f7'
  showAllContainers: false

reporting: "off"
